version: '3.8'

services:
  app:
    image: wms-app-prod
    container_name: wms-production
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./server/warehouse.db:/app/server/warehouse.db
      - ./backups:/app/server/backups
      - ./uploads:/app/server/uploads
    environment:
      - PORT=3000
      - NODE_ENV=production
    command: npm start
